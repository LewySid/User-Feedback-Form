<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

<div class ="container">
    <h1>User Feedback Form</h1>
    <p class="intro">Please provide your feedback below:</p>

    <div id="response">
        <form id="feedbackForm">
            
            <div>
                <label for="name">Full Name:</label>
                <br>   
                <input type="text" id="name" placeholder="Enter your full name." required>
                <small class="error-message" id="name-error"></small>
            </div>

            <div>
                <label for="email">Email:</label>
                <br>
                <input type="email" id="email" placeholder="Enter your email." required>
                <small class="error-message" id="email-error"></small>
            </div>
            
            <div>
                <label for="feedback">Feedback:</label>
                <br>
                <textarea id="feedback" placeholder="Enter your feedback." required></textarea>
                <small class="error-message" id="feedback-error"></small>
            </div>
            
            <div>
                <button type="submit" id="submit-btn">Submit Feedback</button>
            </div>

        </form>
    </div>

    <div id="feedback-display"></div>

</div>

<script src="cp_1.js"></script>
</body>
</html>
